<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR First-Person Racing</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
      window.gameControls = { gas: 0, steer: 0 };
      window.carX = 0;

      // Audio Synthesis for Engine Sound and Crash
      let audioCtx, osc, gainNode;
      function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        osc = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = 40; 
        gainNode.gain.value = 0; 
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
      }

      function playCrashSound() {
        if (!audioCtx) return;
        let cOsc = audioCtx.createOscillator();
        let cGain = audioCtx.createGain();
        cOsc.type = 'sawtooth';
        cOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
        cOsc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
        cGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        cGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        cOsc.connect(cGain);
        cGain.connect(audioCtx.destination);
        cOsc.start();
        cOsc.stop(audioCtx.currentTime + 0.5);
      }

      // VR Controller Handling
      AFRAME.registerComponent('vr-drive-controls', {
        schema: { hand: { type: 'string', default: 'left' } },
        init: function () {
          this.el.addEventListener('thumbstickmoved', (e) => {
            if (window.startAudio) window.startAudio();
            if (this.data.hand === 'left') {
              window.gameControls.steer = (Math.abs(e.detail.x) > 0.1) ? e.detail.x : 0;
            } else {
              window.gameControls.gas = (Math.abs(e.detail.y) > 0.1) ? -e.detail.y : 0;
            }
          });
          
          this.el.addEventListener('axismove', (e) => {
            if (window.startAudio) window.startAudio();
            let x = e.detail.axis[0] || e.detail.axis[2] || 0;
            let y = e.detail.axis[1] || e.detail.axis[3] || 0;
            if (this.data.hand === 'left') {
              if (Math.abs(x) > 0.1) window.gameControls.steer = x;
            } else {
              if (Math.abs(y) > 0.1) window.gameControls.gas = -y;
            }
          });
        }
      });

      // Handle Input (Desktop and VR fallback)
      AFRAME.registerComponent('car-controls', {
        init: function () {
          this.keys = { w: false, a: false, s: false, d: false };
          window.startAudio = () => { initAudio(); if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); };

          window.addEventListener('keydown', (e) => {
            window.startAudio();
            if (e.key === 'w' || e.key === 'ArrowUp') this.keys.w = true;
            if (e.key === 'a' || e.key === 'ArrowLeft') this.keys.a = true;
            if (e.key === 's' || e.key === 'ArrowDown') this.keys.s = true;
            if (e.key === 'd' || e.key === 'ArrowRight') this.keys.d = true;
          });

          window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'ArrowUp') this.keys.w = false;
            if (e.key === 'a' || e.key === 'ArrowLeft') this.keys.a = false;
            if (e.key === 's' || e.key === 'ArrowDown') this.keys.s = false;
            if (e.key === 'd' || e.key === 'ArrowRight') this.keys.d = false;
          });
        },
        tick: function() {
          if (this.keys.w) window.gameControls.gas = 1;
          else if (this.keys.s) window.gameControls.gas = -1;
          else if (!this.el.sceneEl.is('vr-mode')) window.gameControls.gas = 0; 

          if (this.keys.a) window.gameControls.steer = -1;
          else if (this.keys.d) window.gameControls.steer = 1;
          else if (!this.el.sceneEl.is('vr-mode')) window.gameControls.steer = 0;
        }
      });

      // Main Game Logic
      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.speed = 0;
          this.maxSpeed = 50;
          this.accelRate = 15;
          this.brakeRate = 20;
          this.friction = 5;
          this.score = 0;
          this.isGameOver = false;

          let roadLines = document.getElementById('road-lines');
          for (let i = 0; i < 10; i++) {
            let line = document.createElement('a-plane');
            line.setAttribute('width', '0.2');
            line.setAttribute('height', '3');
            line.setAttribute('color', '#EEEEEE');
            line.setAttribute('rotation', '-90 0 0');
            line.setAttribute('position', `0 0.01 ${-i * 6}`);
            line.classList.add('road-mark');
            roadLines.appendChild(line);
          }

          // Obstacles removed from setup
        },
        hitObstacle: function () {
          // Obstacle logic removed
        },
        tick: function(time, timeDelta) {
          if (timeDelta > 100) timeDelta = 100;
          var dt = timeDelta / 1000;
          
          if (this.isGameOver) return;
          
          var targetSpeed = this.speed;
          if (window.gameControls.gas > 0) targetSpeed += this.accelRate * window.gameControls.gas * dt;
          else if (window.gameControls.gas < 0) targetSpeed -= this.brakeRate * Math.abs(window.gameControls.gas) * dt; 
          else targetSpeed -= this.friction * dt;

          this.speed = Math.max(0, Math.min(this.maxSpeed, targetSpeed));

          if (this.speed > 5) document.getElementById('tutorial').setAttribute('visible', 'false');

          if (osc && gainNode && audioCtx.state === 'running') {
            osc.frequency.value = 40 + this.speed * 2.5;
            gainNode.gain.value = this.speed > 1 ? 0.05 + (this.speed / this.maxSpeed) * 0.1 : 0;
          }

          var cockpit = document.getElementById('cockpit');
          var rumbleY = (Math.random() - 0.5) * (this.speed / 1000); 

          var steerAmount = window.gameControls.steer * this.speed * 0.15 * dt;
          window.carX += steerAmount;
          window.carX = Math.max(-4, Math.min(4, window.carX));

          var wheel = document.getElementById('steering-wheel');
          if (wheel) wheel.setAttribute('rotation', `15 0 ${-window.gameControls.steer * 90}`);

          if (cockpit) {
             cockpit.setAttribute('position', `${window.carX} ${0 + rumbleY} 0`);
             cockpit.setAttribute('rotation', `0 ${-window.gameControls.steer * 10} ${-window.gameControls.steer * 5}`);
          }

          var speedZ = this.speed * dt;
          
          // Move lines
          document.querySelectorAll('.road-mark').forEach(l => {
            var z = l.object3D.position.z + speedZ;
            if (z > 5) z -= 60;
            l.object3D.position.z = z;
          });

          // Obstacle move logic removed

          this.score += this.speed * dt;
          document.getElementById('speed-display').setAttribute('value', Math.floor(this.speed * 2) + ' km/h');
          document.getElementById('score-display').setAttribute('value', 'Score: ' + Math.floor(this.score));
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #87CEEB" game-manager car-controls>
      
      <!-- Left mapped to turning -->
      <a-entity laser-controls="hand: left" oculus-touch-controls="hand: left" vr-drive-controls="hand: left" raycaster="showLine: false"></a-entity>
      <!-- Right mapped to gas -->
      <a-entity laser-controls="hand: right" oculus-touch-controls="hand: right" vr-drive-controls="hand: right" raycaster="showLine: false"></a-entity>
      
      <a-light type="directional" position="-1 2 1" intensity="0.8"></a-light>
      <a-light type="ambient" intensity="0.4"></a-light>

      <a-plane position="0 0 -25" rotation="-90 0 0" width="12" height="100" color="#222222"></a-plane>
      <a-plane position="-20 0 -25" rotation="-90 0 0" width="28" height="100" color="#3B5E2B"></a-plane>
      <a-plane position="20 0 -25" rotation="-90 0 0" width="28" height="100" color="#3B5E2B"></a-plane>
      
      <a-entity id="road-lines"></a-entity>
      <a-entity id="obstacles"></a-entity>

      <a-text id="tutorial" value="Use W A S D or Thumbsticks to Drive!" position="0 3 -5" align="center" color="#FFFFFF" scale="1.5 1.5 1.5"></a-text>

      <a-entity id="cockpit" position="0 0 0">
        <a-camera position="0 1.2 0" wasd-controls-enabled="false" look-controls-enabled="true"></a-camera>

        <a-box position="0 0.7 -0.8" width="1.6" height="0.4" depth="0.4" color="#111111"></a-box>
        <a-box position="0 0.8 -1.25" width="1.6" height="0.1" depth="0.8" color="#A00000"></a-box>

        <a-cylinder position="0 0.7 -0.6" rotation="15 0 0" radius="0.05" height="0.3" color="#333333"></a-cylinder>
        <a-torus id="steering-wheel" position="0 0.8 -0.5" rotation="15 0 0" radius="0.25" radius-tubular="0.03" color="#222222"></a-torus>

        <a-cylinder position="-0.75 1.1 -0.8" rotation="30 0 0" radius="0.03" height="0.8" color="#111111"></a-cylinder>
        <a-cylinder position="0.75 1.1 -0.8" rotation="30 0 0" radius="0.03" height="0.8" color="#111111"></a-cylinder>

        <a-plane position="-0.4 0.75 -0.6" rotation="-15 0 0" width="0.4" height="0.2" color="#000000">
           <a-text id="speed-display" value="0 km/h" position="0 0 0.01" align="center" color="#00FF00" scale="0.5 0.5 0.5"></a-text>
        </a-plane>

        <a-plane position="0.4 0.75 -0.6" rotation="-15 0 0" width="0.4" height="0.2" color="#000000">
           <a-text id="score-display" value="Score: 0" position="0 0 0.01" align="center" color="#FFFFFF" scale="0.5 0.5 0.5"></a-text>
        </a-plane>

        <a-plane position="0 0.75 -0.6" rotation="-15 0 0" width="0.3" height="0.1" color="#000" visible="false" material="opacity:0">
           <a-text id="status-display" value="" position="0 0 0.01" align="center" color="#FF0000" scale="0.6 0.6 0.6"></a-text>
        </a-plane>
      </a-entity>

    </a-scene>
  </body>
</html>
